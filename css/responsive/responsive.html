
<!--

Responsive :Responsive web design is about creating web pages that look good on all devices!
A responsive web design will automatically adjust for different screen sizes and viewports.

Web pages can be viewed with many different devices: desktops, tablets, and mobile phones.

Your web page should look good, and be easy to use, regardless of the device.

Responsive web design is about using HTML and CSS to automatically resize, hide, 
shrink, or enlarge a website, to make it look good on all devices.

Key components in responsive web design are:

Viewport <meta> tag
Flexible layout (grid and flex)
Mediaqueries

//===============================================


What is a Media Query?
Media query is a CSS technique introduced in CSS3.

It uses the @media rule to include a block of CSS properties only 
if a certain condition is true.


Requirement (Responsive)

html 5   <!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">



-->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
	
	<style>
		.box{
			width:300px;
			height:300px;
			background-color:red;
			float:left;
		}
	
		@media only screen and (min-width: 600px) {
			
			.box{
				 background-color: green;
			}
		}
		
		@media only screen and (min-width: 900px) {
			
			.box{
				 background-color: blue;
			}
		}
	</style>
	
	
</head>

<body>


	<div class="box">
		<h1>Responsive</h1>
	</div>
		
</body>

</html>
