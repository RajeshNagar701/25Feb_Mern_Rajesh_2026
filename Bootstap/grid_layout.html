<!--

https://www.w3schools.com/bootstrap4/bootstrap_grid_basic.asp

Bootstrap's grid system is built with flexbox and allows up to 
12 columns across the page.

The grid system is responsive, and the columns will re-arrange automatically depending on the screen size.

Make sure that the sum adds up to 12 or fewer (it is not required that you use all 12 available columns).

Grid Classes
The Bootstrap 5 grid system has six classes:

.row : all col works in row class

.col- (extra small devices - screen width less than 576px) < mobile
.col-sm- (small devices - screen width equal to or greater than 576px) tablet
.col-md- (medium devices - screen width equal to or greater than 768px) > pc laptop screen
.col-lg- (large devices - screen width equal to or greater than 992px)
.col-xl- (xlarge devices - screen width equal to or greater than 1200px)
.col-xxl- (xxlarge devices - screen width equal to or greater than 1400px)
-->


<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  </head>

<body>

<div class="container">

	
	<div class="row">
		<div class="col-3 bg-danger"> hello</div>
		<div class="col-6 bg-success"> hello</div>
		<div class="col-3 bg-danger"> hello</div>
	</div>
	
	<hr>
	
	<div class="row">
		<div class="col-md-3 bg-danger"> hello</div>
		<div class="col-md-3 bg-success"> hello</div>
		<div class="col-md-3 bg-danger"> hello</div>
		<div class="col-md-3 bg-success"> hello</div>
	</div>
	<hr>
	<div class="row">
		<div class="col-md bg-danger"> hello</div>
		<div class="col-md bg-success"> hello</div>
		<div class="col-md bg-danger"> hello</div>
		<div class="col-md bg-success"> hello</div>
		<div class="col-md bg-danger"> hello</div>
	</div>
	<hr>
	<div class="row">
		<div class="col-md-3 col-sm-6 bg-danger"> hello</div>
		<div class="col-md-3 col-sm-6 bg-success"> hello</div>
		<div class="col-md-3 col-sm-6 bg-danger"> hello</div>
		<div class="col-md-3 col-sm-6 bg-success"> hello</div>
	</div>
	
</div>




</body>
</html>
