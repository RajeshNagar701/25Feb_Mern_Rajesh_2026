<script>
/*
The try Statement
In JavaScript, the try statement is used to handle errors (also called exceptions) 
that may occur during code execution - without stopping the entire program.

The try statement works together with catch.

Sometimes it works with finally.

And sometimes it works with throw.


try {
  // Code that may cause an error
} catch (error) {
  // Code to handle the error
}

*/



try {
  // Code that might fail
  var a=10;
  document.write(a);
} catch (error) {
  // Handle the error
  console.error("Error name:", error.name);
  console.error("Error message:", error.message);
} finally {
  // Always runs
  console.log("Cleanup complete.");
}

</script>
