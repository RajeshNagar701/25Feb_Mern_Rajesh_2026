
<script>

/*

Web services

Web services are standardized software systems that allow different applications to 
communicate and exchange data over a network, such as the internet.

	API : https://jsonplaceholder.typicode.com/posts
1)REST (Representational State Transfer): The most common standard. 
It uses standard HTTP methods (GET, POST, PUT, DELETE) and typically 
exchanges data using lightweight JSON.

2)SOAP (Simple Object Access Protocol): A highly structured, strictly standardized 
protocol that relies entirely on XML for message formatting and requires a 
WSDL (Web Services Description Language) to define the service's capabilities



The fetch() method starts the process of fetching a resource from a server.

The fetch() method returns a Promise that resolves to a Response object.

*/

	fetch(`https://jsonplaceholder.typicode.com/posts`)
	.then((data)=>data.json())
	.then((object)=> { 
		
		//console.log(object)
		for(obj of object)
		{
			document.write(`<p> ${obj.id} ${obj.title} </p>`);
		}
	});
	
</script>
